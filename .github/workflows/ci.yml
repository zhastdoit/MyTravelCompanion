name: CI

on:
  push:
    branches: [main, start]
  pull_request:
    branches: [main, start]

# Avoid doubling up on concurrent runs of the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  USE_MOCK_LLM: "1"
  MOCK_EXTERNAL_APIS: "1"

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend (typecheck + lint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/travel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/travel/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
        env:
          BACKEND_URL: http://localhost:8000

  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/travel/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # Skip the .venv dance — the smoke script handles a missing venv too.
          pip install -r requirements.txt
      - name: Install frontend deps
        working-directory: frontend/travel
        run: npm ci
      - name: Install jq + uuidgen
        run: |
          sudo apt-get update
          sudo apt-get install -y jq uuid-runtime
      - name: Run smoke
        run: bash scripts/smoke.sh

  evals:
    name: Eval scenarios (mock)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run mock evals
        run: python -m evals.run --report eval-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: backend/eval-report.md
          if-no-files-found: ignore
